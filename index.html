<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>로또 번호 생성기</h1>
    <div class="theme-toggle">
      <button id="theme-btn">다크 모드</button>
    </div>
    <div id="lotto-numbers" class="numbers">
      <!-- 번호가 여기에 생성됩니다 -->
    </div>
    <button id="generate-btn">번호 생성하기</button>
  </div>

  <div class="container partnership-container">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/xnjbykrw" method="POST" id="partnership-form">
      <div class="form-group">
        <label for="name">성함/업체명</label>
        <input type="text" id="name" name="name" required placeholder="예: 홍길동 / (주)파트너">
      </div>
      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="_replyto" required placeholder="example@domain.com">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" required placeholder="제휴 제안 내용을 입력해주세요."></textarea>
      </div>
      <button type="submit" class="submit-btn">문의하기</button>
    </form>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
